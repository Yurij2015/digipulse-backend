name: Database Restore

on:
  # Manual trigger only — restoring always requires explicit human action
  workflow_dispatch:
    inputs:
      filename:
        description: 'Backup filename to restore (e.g. digipulse_2026-05-06_03-00-00.dump)'
        required: true
      confirm:
        description: 'Type "yes" to confirm — ALL existing data will be replaced!'
        required: true
        default: ''

jobs:
  restore:
    name: Restore PostgreSQL from backup
    runs-on: ubuntu-latest

    steps:
      # Safety gate — workflow exits immediately if confirmation is missing
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "❌ Confirmation not received. Type 'yes' in the confirm field."
            exit 1
          fi

      - name: Run restore on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SERVER_PORT }}
          script: |
            set -euo pipefail

            DB_CONTAINER="digipulse-db"
            DB_NAME="${{ vars.DB_DATABASE }}"
            DB_USER="${{ vars.DB_USERNAME }}"

            HETZNER_USER="${{ vars.HETZNER_USER }}"
            HETZNER_HOST="${HETZNER_USER}.your-storagebox.de"
            HETZNER_PORT=23
            HETZNER_DIR="backups/postgres"

            LOCAL_DIR="/home/digipulse/backups"
            FILENAME="${{ github.event.inputs.filename }}"

            if [[ ! "$FILENAME" =~ ^digipulse_[0-9]{4}-[0-9]{2}-[0-9]{2}_[0-9]{2}-[0-9]{2}-[0-9]{2}\.dump$ ]]; then
              echo "❌ Invalid filename format. Expected: digipulse_YYYY-MM-DD_HH-MM-SS.dump"
              exit 1
            fi

            TEMP_FILE="${LOCAL_DIR}/restore_temp.dump"

            mkdir -p "$LOCAL_DIR"

            echo "→ Downloading ${FILENAME} from Hetzner..."
            rsync -az \
              -e "ssh -p ${HETZNER_PORT} -o StrictHostKeyChecking=no -o BatchMode=yes" \
              "${HETZNER_USER}@${HETZNER_HOST}:${HETZNER_DIR}/${FILENAME}" \
              "${TEMP_FILE}"
            echo "✓ Downloaded: $(du -sh ${TEMP_FILE} | cut -f1)"

            # Safety net: dump current state before overwriting anything
            EMERGENCY="${LOCAL_DIR}/pre_restore_$(date +%Y-%m-%d_%H-%M-%S).dump"
            echo "→ Creating emergency dump of current state → ${EMERGENCY}"
            docker exec "$DB_CONTAINER" pg_dump \
              -U "$DB_USER" -d "$DB_NAME" \
              --format=custom > "$EMERGENCY" || echo "⚠ Emergency dump failed — continuing anyway"
            echo "✓ Emergency dump saved: $(du -sh ${EMERGENCY} | cut -f1)"

            # Terminate all active connections so we can drop the database
            echo "→ Terminating active connections..."
            docker exec "$DB_CONTAINER" psql -U "$DB_USER" -d postgres -c \
              "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='${DB_NAME}' AND pid <> pg_backend_pid();" \
              > /dev/null 2>&1 || true

            echo "→ Dropping and recreating database..."
            docker exec "$DB_CONTAINER" psql -U "$DB_USER" -d postgres \
              -c "DROP DATABASE IF EXISTS ${DB_NAME};" > /dev/null

            docker exec "$DB_CONTAINER" psql -U "$DB_USER" -d postgres \
              -c "CREATE DATABASE ${DB_NAME} OWNER ${DB_USER};" > /dev/null

            echo "→ Restoring from ${FILENAME}..."
            docker exec -i "$DB_CONTAINER" pg_restore \
              -U "$DB_USER" \
              -d "$DB_NAME" \
              --no-owner \
              --no-acl \
              < "$TEMP_FILE"
            echo "✓ Restore complete"

            # Run migrations in case the backup is older than the current codebase
            echo "→ Running migrations..."
            docker exec digipulse-app php artisan migrate --force 2>/dev/null \
              && echo "✓ Migrations done" \
              || echo "⚠ Migrations skipped (container may not be running)"

            # Clear cache so stale data does not leak through
            docker exec digipulse-app php artisan cache:clear 2>/dev/null || true
            docker exec digipulse-app php artisan config:clear 2>/dev/null || true
            echo "✓ Cache cleared"

            rm -f "$TEMP_FILE"

            echo ""
            echo "✓ Restore complete!"
            echo "  Restored from: ${FILENAME}"
            echo "  Emergency dump: ${EMERGENCY}"
            echo "  Triggered by: ${{ github.actor }}"

      # Show available backups after restore so the operator can verify state
      - name: List current backups on Hetzner
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SERVER_PORT }}
          script: |
            echo "Available backups on Hetzner:"
            ssh -p 23 \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_USER }}.your-storagebox.de" \
              "ls -lht backups/postgres/*.dump 2>/dev/null | awk '{print \$5, \$9}' | sed 's|backups/postgres/||'" \
              || echo "(no backups found)"
