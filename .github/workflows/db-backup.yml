name: Database Backup

on:
  # Manual trigger via GitHub UI — "Run workflow" button appears in Actions tab
  workflow_dispatch:
    inputs:
      note:
        description: 'Reason for backup (optional)'
        required: false
        default: 'Manual backup'

  # Automatically every day at 03:00 UTC
  schedule:
    - cron: '0 3 * * *'

jobs:
  backup:
    name: Backup PostgreSQL → Hetzner Storage Box
    runs-on: ubuntu-latest

    steps:
      - name: Run backup on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SERVER_PORT }}
          script: |
            set -euo pipefail

            DB_CONTAINER="digipulse-db"
            DB_NAME="${{ vars.DB_DATABASE }}"
            DB_USER="${{ vars.DB_USERNAME }}"

            HETZNER_USER="${{ vars.HETZNER_USER }}"
            HETZNER_HOST="${HETZNER_USER}.your-storagebox.de"
            HETZNER_PORT=23
            HETZNER_DIR="digipulse/backups/postgres"

            LOCAL_DIR="$HOME/backups"
            DATE=$(date +%Y-%m-%d_%H-%M-%S)
            FILENAME="digipulse_${DATE}.dump"

            echo "→ Environment Info:"
            echo "  User: $(whoami)"
            echo "  Home: $HOME"
            echo "  Local Dir: $LOCAL_DIR"
            echo "  Database: $DB_NAME"

            mkdir -p "$LOCAL_DIR"

            echo "→ Step 1: Dumping database from container $DB_CONTAINER..."
            if ! docker exec "$DB_CONTAINER" pg_dump \
              -U "$DB_USER" \
              -d "$DB_NAME" \
              --format=custom \
              --no-acl \
              --no-owner \
              > "${LOCAL_DIR}/${FILENAME}"; then
                echo "❌ Database dump failed!"
                exit 1
            fi

            SIZE=$(du -sh "${LOCAL_DIR}/${FILENAME}" | cut -f1)
            echo "✓ Dump created: ${FILENAME} (${SIZE})"

            echo "→ Step 2: Uploading to Hetzner Storage Box (path: ${HETZNER_DIR})..."
            if ! rsync -az \
              -e "ssh -p ${HETZNER_PORT} -o StrictHostKeyChecking=no -o BatchMode=yes" \
              "${LOCAL_DIR}/${FILENAME}" \
              "${HETZNER_USER}@${HETZNER_HOST}:${HETZNER_DIR}/"; then
                echo "❌ Upload to Hetzner failed!"
                exit 1
            fi
            echo "✓ Uploaded to Hetzner"

            echo "→ Step 3: Cleaning up old local backups..."
            find "$LOCAL_DIR" -name "*.dump" -mtime +3 -delete
            echo "✓ Local cleanup complete"

            echo "→ Step 4: Cleaning up old remote backups (keeping last 30)..."
            REMOTE_FILES=$(ssh -p "$HETZNER_PORT" -o StrictHostKeyChecking=no -o BatchMode=yes "${HETZNER_USER}@${HETZNER_HOST}" "ls -1 ${HETZNER_DIR}/digipulse_*.dump" | sort -r || true)
            
            if [ -n "$REMOTE_FILES" ]; then
              # Get files to delete (everything after the first 30)
              FILES_TO_DELETE=$(echo "$REMOTE_FILES" | tail -n +31)
              
              if [ -n "$FILES_TO_DELETE" ]; then
                for FILE in $FILES_TO_DELETE; do
                  echo "  Removing old backup: $FILE"
                  ssh -p "$HETZNER_PORT" -o StrictHostKeyChecking=no -o BatchMode=yes "${HETZNER_USER}@${HETZNER_HOST}" "rm $FILE"
                done
                echo "✓ Remote cleanup complete"
              else
                echo "  No old backups to remove (less than 30 files found)"
              fi
            fi

            echo ""
            echo "Current backups on Storage Box:"
            ssh -p "$HETZNER_PORT" \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${HETZNER_USER}@${HETZNER_HOST}" \
              "ls -lht ${HETZNER_DIR}/"

            echo ""
            echo "✅ Backup process finished successfully!"
            echo "  Note: ${{ github.event.inputs.note || 'Scheduled backup' }}"
            echo "  Triggered by: ${{ github.actor }}"
