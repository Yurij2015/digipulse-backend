name: Deploy DigiPulse Backend

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE: ghcr.io/yurij2015/digipulse-backend

permissions:
  contents: read
  packages: write

jobs:
  create-deployment-artifacts:
    name: Create deployment artifacts
    runs-on: ubuntu-latest
    outputs:
      DEPLOYMENT_MATRIX: ${{ steps.export-deployment-matrix.outputs.DEPLOYMENT_MATRIX }}
      DOCKER_CHANGED: ${{ steps.docker-check.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Configure PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          coverage: none
          extensions: mbstring, ctype, fileinfo, openssl, pdo_mysql, pdo_pgsql, bcmath, json, tokenizer, xml, pgsql, gd, zip, curl, intl, redis, pcntl
          ini-values: post_max_size=256M, upload_max_filesize=256M
      - name: Create temporary .env for build
        run: |
          cp .env.example .env || echo "APP_KEY=base64:test" > .env
          echo "BROADCAST_CONNECTION=log" >> .env
      - name: Composer install
        run: |
          composer install --no-dev --no-interaction --prefer-dist
      - name: Create deployment artifact
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Ensure storage structure exists in the artifact
          mkdir -p storage/framework/{cache,sessions,testing,views}
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          touch storage/logs/laravel.log
          
          tar -czf "${GITHUB_SHA}".tar.gz --exclude=.git --exclude=node_modules *
      - name: Store artifact for distribution
        uses: actions/upload-artifact@v7
        with:
          name: app-build
          path: ${{ github.sha }}.tar.gz
      - name: Export deployment matrix
        id: export-deployment-matrix
        run: |
          delimiter="$(openssl rand -hex 8)"
          JSON="$(cat ./deployment-config.json)"
          echo "DEPLOYMENT_MATRIX<<${delimiter}" >> "${GITHUB_OUTPUT}"
          echo "$JSON" >> "${GITHUB_OUTPUT}"
          echo "${delimiter}" >> "${GITHUB_OUTPUT}"

      - name: Check if Docker image needs rebuild
        id: docker-check
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE '^docker/'; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

  build-docker-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: create-deployment-artifacts
    if: needs.create-deployment-artifacts.outputs.DOCKER_CHANGED == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  prepare-release-on-servers:
    name: "${{ matrix.server.name }}: Prepare release"
    runs-on: ubuntu-latest
    needs: create-deployment-artifacts
    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deployment-artifacts.outputs.DEPLOYMENT_MATRIX) }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: app-build
      - name: Bootstrap server directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          script: |
            # Idempotent: create all required dirs on a clean server
            mkdir -p ${{ matrix.server.path }}/{releases,artifacts,storage}
            mkdir -p ${{ matrix.server.path }}/storage/{app,public,framework,logs}
            mkdir -p ${{ matrix.server.path }}/storage/framework/{cache,sessions,testing,views}
            mkdir -p ${{ matrix.server.path }}/storage/framework/cache/data # Optional but helpful
            mkdir -p ${{ matrix.server.path }}/storage/framework/views
            mkdir -p ${{ matrix.server.path }}/storage/logs
            sudo chmod -R 777 ${{ matrix.server.path }}/storage || true
      - name: Upload
        uses: appleboy/scp-action@master
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          source: ${{ github.sha }}.tar.gz
          target: ${{ matrix.server.path }}/artifacts
      - name: Extract archive and create directories
        uses: appleboy/ssh-action@master
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          envs: GITHUB_SHA
          script: |
            RELEASE_DIR="${{ matrix.server.path }}/releases/${GITHUB_SHA}"
            STORAGE_DIR="${{ matrix.server.path }}/storage"

            # Clean old release dir (may have root-owned files from Docker)
            docker run --rm -v "${{ matrix.server.path }}/releases":/data alpine rm -rf "/data/${GITHUB_SHA}" 2>/dev/null || true

            mkdir -p "$RELEASE_DIR"
            tar xzf ${{ matrix.server.path }}/artifacts/${GITHUB_SHA}.tar.gz --no-same-owner --no-same-permissions -C "$RELEASE_DIR"
            rm -rf "$RELEASE_DIR/storage"

            # Ensure shared storage structure
            mkdir -p "$STORAGE_DIR/app" "$STORAGE_DIR/public" "$STORAGE_DIR/framework" "$STORAGE_DIR/logs"
            mkdir -p "$STORAGE_DIR/framework/cache" "$STORAGE_DIR/framework/sessions" "$STORAGE_DIR/framework/testing" "$STORAGE_DIR/framework/views"

            # Fix permissions via Docker (runs as root)
            docker run --rm -v "$STORAGE_DIR":/data -v "$RELEASE_DIR":/release alpine sh -c "chmod -R 777 /data && chmod -R 777 /release/bootstrap/cache" 2>/dev/null || true

  create-env-file:
    name: "${{ matrix.server.name }}: Write .env to server"
    runs-on: ubuntu-latest
    needs: [create-deployment-artifacts, prepare-release-on-servers]
    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deployment-artifacts.outputs.DEPLOYMENT_MATRIX) }}
    steps:
      - name: Write production .env
        uses: appleboy/ssh-action@master
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          script: |
            # Prepare configuration from GitHub Variables (Variables only, except SSH)
            get_val() {
              if [ -n "$1" ]; then echo "$1"; else echo "$2"; fi
            }

            APP_KEY=$(get_val "${{ vars.APP_KEY }}" "")
            APP_URL=$(get_val "${{ vars.APP_URL }}" "http://localhost")
            DB_HOST=$(get_val "${{ vars.DB_HOST }}" "digipulse-db")
            DB_DATABASE=$(get_val "${{ vars.DB_DATABASE }}" "digipulse")
            DB_USERNAME=$(get_val "${{ vars.DB_USERNAME }}" "digipulse")
            DB_PASSWORD=$(get_val "${{ vars.DB_PASSWORD }}" "")
            REDIS_HOST=$(get_val "${{ vars.REDIS_HOST }}" "digipulse-redis")
            
            FRONTEND_KEY=$(get_val "${{ vars.FRONTEND_KEY }}" "")
            MAIL_HOST=$(get_val "${{ vars.MAIL_HOST }}" "smtp.mailtrap.io")
            MAIL_PORT=$(get_val "${{ vars.MAIL_PORT }}" "2525")
            MAIL_USERNAME=$(get_val "${{ vars.MAIL_USERNAME }}" "")
            MAIL_PASSWORD=$(get_val "${{ vars.MAIL_PASSWORD }}" "")
            MAIL_FROM_ADDRESS=$(get_val "${{ vars.MAIL_FROM_ADDRESS }}" "hello@example.com")
            
            GOOGLE_CLIENT_ID=$(get_val "${{ vars.GOOGLE_CLIENT_ID }}" "")
            GOOGLE_CLIENT_SECRET=$(get_val "${{ vars.GOOGLE_CLIENT_SECRET }}" "")
            TELEGRAM_BOT_TOKEN=$(get_val "${{ vars.TELEGRAM_BOT_TOKEN }}" "")
            TELEGRAM_BOT_USERNAME=$(get_val "${{ vars.TELEGRAM_BOT_USERNAME }}" "")
            INTERNAL_MONITOR_KEY=$(get_val "${{ vars.INTERNAL_MONITOR_KEY }}" "")
            
            TURNSTILE_ACTIVE=$(get_val "${{ vars.TURNSTILE_ACTIVE }}" "false")
            TURNSTILE_SITE_KEY=$(get_val "${{ vars.TURNSTILE_SITE_KEY }}" "")
            TURNSTILE_SECRET_KEY=$(get_val "${{ vars.TURNSTILE_SECRET_KEY }}" "")
            FILAMENT_ADMIN_EMAIL=$(get_val "${{ vars.FILAMENT_ADMIN_EMAIL }}" "")

            # Generate .env file
            cat > ${{ matrix.server.path }}/.env << ENVEOF
            APP_NAME="DigiPulse"
            APP_ENV=production
            APP_KEY=$APP_KEY
            APP_DEBUG=false
            APP_URL=$APP_URL
            FRONTEND_KEY=$FRONTEND_KEY
            FILAMENT_ADMIN_EMAIL=$FILAMENT_ADMIN_EMAIL

            DB_CONNECTION=pgsql
            DB_HOST=$DB_HOST
            DB_PORT=5432
            DB_DATABASE=$DB_DATABASE
            DB_USERNAME=$DB_USERNAME
            DB_PASSWORD=$DB_PASSWORD

            REDIS_HOST=$REDIS_HOST
            REDIS_PORT=6379
            QUEUE_CONNECTION=redis
            CACHE_STORE=redis
            SESSION_DRIVER=redis
            SESSION_LIFETIME=120

            FILESYSTEM_DISK=local

            MAIL_MAILER=smtp
            MAIL_HOST=$MAIL_HOST
            MAIL_PORT=$MAIL_PORT
            MAIL_USERNAME=$MAIL_USERNAME
            MAIL_PASSWORD=$MAIL_PASSWORD
            MAIL_FROM_ADDRESS=$MAIL_FROM_ADDRESS
            MAIL_FROM_NAME="DigiPulse"

            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            GOOGLE_REDIRECT_URI=$APP_URL/auth/callback

            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_BOT_USERNAME=$TELEGRAM_BOT_USERNAME

            INTERNAL_MONITOR_KEY=$INTERNAL_MONITOR_KEY

            TURNSTILE_ACTIVE=$TURNSTILE_ACTIVE
            TURNSTILE_SITE_KEY=$TURNSTILE_SITE_KEY
            TURNSTILE_SECRET_KEY=$TURNSTILE_SECRET_KEY

            OCTANE_SERVER=frankenphp
            LOG_CHANNEL=stack
            LOG_LEVEL=error
            ENVEOF

  run-before-hooks:
    name: "${{ matrix.server.name }}: Before hook"
    runs-on: ubuntu-latest
    needs: [create-deployment-artifacts, prepare-release-on-servers, create-env-file]
    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deployment-artifacts.outputs.DEPLOYMENT_MATRIX) }}
    steps:
      - name: Run before hooks
        uses: appleboy/ssh-action@master
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_PATH: ${{ matrix.server.path }}/releases/${{ github.sha }}
          ACTIVE_RELEASE_PATH: ${{ matrix.server.path }}/current
          STORAGE_PATH: ${{ matrix.server.path }}/storage
          BASE_PATH: ${{ matrix.server.path }}
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          envs: GITHUB_SHA,RELEASE_PATH,ACTIVE_RELEASE_PATH,STORAGE_PATH,BASE_PATH
          script: |
            HOOKS="${{ matrix.server.beforeHooks }}"
            if [ -n "$HOOKS" ]; then
              eval "$HOOKS"
            fi

  activate-release:
    name: "${{ matrix.server.name }}: Activate release"
    runs-on: ubuntu-latest
    needs: [create-deployment-artifacts, prepare-release-on-servers, run-before-hooks]
    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deployment-artifacts.outputs.DEPLOYMENT_MATRIX) }}
    steps:
      - name: Activate release
        uses: appleboy/ssh-action@master
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_PATH: ${{ matrix.server.path }}/releases/${{ github.sha }}
          ACTIVE_RELEASE_PATH: ${{ matrix.server.path }}/current
          STORAGE_PATH: ${{ matrix.server.path }}/storage
          BASE_PATH: ${{ matrix.server.path }}
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          envs: GITHUB_SHA,RELEASE_PATH,ACTIVE_RELEASE_PATH,STORAGE_PATH,BASE_PATH
          script: |
            # If current exists as a directory (common when docker creates volumes before deploy), remove it
            if [ -d "$ACTIVE_RELEASE_PATH" ] && [ ! -L "$ACTIVE_RELEASE_PATH" ]; then
              sudo rm -rf "$ACTIVE_RELEASE_PATH"
            fi

            if [ -f "${BASE_PATH}/.env" ]; then
              cp -a "${BASE_PATH}/.env" "${BASE_PATH}/.env_prev" || true
              ln -s -f "${BASE_PATH}/.env" "${RELEASE_PATH}/.env"
            fi

            ln -s -f $STORAGE_PATH $RELEASE_PATH
            ln -s -n -f $RELEASE_PATH $ACTIVE_RELEASE_PATH

  run-after-hooks:
    name: "${{ matrix.server.name }}: After hook"
    runs-on: ubuntu-latest
    needs: [create-deployment-artifacts, prepare-release-on-servers, run-before-hooks, activate-release]
    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deployment-artifacts.outputs.DEPLOYMENT_MATRIX) }}
    steps:
      - name: Run after hooks
        uses: appleboy/ssh-action@master
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_PATH: ${{ matrix.server.path }}/releases/${{ github.sha }}
          ACTIVE_RELEASE_PATH: ${{ matrix.server.path }}/current
          STORAGE_PATH: ${{ matrix.server.path }}/storage
          BASE_PATH: ${{ matrix.server.path }}
          AFTER_HOOKS: ${{ matrix.server.afterHooks }}
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          envs: GITHUB_SHA,RELEASE_PATH,ACTIVE_RELEASE_PATH,STORAGE_PATH,BASE_PATH,AFTER_HOOKS
          script: |
            set -euo pipefail
            if [ -n "${AFTER_HOOKS:-}" ]; then
              eval "$AFTER_HOOKS"
            fi

  clean-up:
    name: "${{ matrix.server.name }}: Clean up"
    runs-on: ubuntu-latest
    needs: [create-deployment-artifacts, prepare-release-on-servers, run-before-hooks, activate-release, run-after-hooks]
    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deployment-artifacts.outputs.DEPLOYMENT_MATRIX) }}
    steps:
      - name: Clean up old releases
        uses: appleboy/ssh-action@master
        env:
          RELEASES_PATH: ${{ matrix.server.path }}/releases
          ARTIFACTS_PATH: ${{ matrix.server.path }}/artifacts
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          envs: RELEASES_PATH,ARTIFACTS_PATH
          script: |
            cd $RELEASES_PATH && ls -t -1 | tail -n +6 | xargs sudo rm -rf || true
            cd $ARTIFACTS_PATH && ls -t -1 | tail -n +6 | xargs sudo rm -rf || true
