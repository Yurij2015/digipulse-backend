name: Export deploy matrix from repository variables
description: Builds DEPLOYMENT_MATRIX JSON from DEPLOY_SERVER_* inputs (pass vars from the workflow).

inputs:
  deploy_server_name:
    description: DEPLOY_SERVER_NAME
    required: true
  deploy_server_ip:
    description: DEPLOY_SERVER_IP
    required: true
  deploy_server_port:
    description: DEPLOY_SERVER_PORT
    required: true
  deploy_server_username:
    description: DEPLOY_SERVER_USERNAME
    required: true
  deploy_server_path:
    description: DEPLOY_SERVER_PATH
    required: true

outputs:
  DEPLOYMENT_MATRIX:
    description: JSON array for strategy.matrix.server
    value: ${{ steps.export.outputs.DEPLOYMENT_MATRIX }}

runs:
  using: composite
  steps:
    - name: Build matrix JSON
      id: export
      shell: bash
      env:
        DEPLOY_SERVER_NAME: ${{ inputs.deploy_server_name }}
        DEPLOY_SERVER_IP: ${{ inputs.deploy_server_ip }}
        DEPLOY_SERVER_PORT: ${{ inputs.deploy_server_port }}
        DEPLOY_SERVER_USERNAME: ${{ inputs.deploy_server_username }}
        DEPLOY_SERVER_PATH: ${{ inputs.deploy_server_path }}
      run: |
        set -euo pipefail
        missing=()
        for key in DEPLOY_SERVER_NAME DEPLOY_SERVER_IP DEPLOY_SERVER_PORT DEPLOY_SERVER_USERNAME DEPLOY_SERVER_PATH; do
          if [ -z "${!key:-}" ]; then
            missing+=("$key")
          fi
        done
        if [ "${#missing[@]}" -gt 0 ]; then
          echo "Missing deploy inputs: ${missing[*]}"
          echo "Set GitHub Variables and pass them in the workflow uses: with: block"
          exit 1
        fi
        delimiter="$(openssl rand -hex 8)"
        JSON="$(jq -n \
          --arg name "$DEPLOY_SERVER_NAME" \
          --arg ip "$DEPLOY_SERVER_IP" \
          --arg port "$DEPLOY_SERVER_PORT" \
          --arg username "$DEPLOY_SERVER_USERNAME" \
          --arg path "$DEPLOY_SERVER_PATH" \
          '[{name:$name,ip:$ip,port:$port,username:$username,path:$path}]')"
        {
          echo "DEPLOYMENT_MATRIX<<${delimiter}"
          echo "$JSON"
          echo "${delimiter}"
        } >> "${GITHUB_OUTPUT}"
