<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bright Yellow Background (User preferred) -->
  <rect width="32" height="32" rx="8" fill="#FACC15"/>
  
  <defs>
    <linearGradient id="grad-admin-yellow-final" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#06b6d4" />
    </linearGradient>
  </defs>
  
  <!-- Original Frontend 7-Bar Pattern -->
  <rect x="2" y="18" width="3" height="10" rx="1" fill="url(#grad-admin-yellow-final)" />
  <rect x="6" y="12" width="3" height="16" rx="1" fill="url(#grad-admin-yellow-final)" />
  <rect x="10" y="6" width="3" height="22" rx="1" fill="url(#grad-admin-yellow-final)" />
  <rect x="14" y="14" width="3" height="14" rx="1" fill="url(#grad-admin-yellow-final)" />
  <rect x="18" y="20" width="3" height="8" rx="1" fill="url(#grad-admin-yellow-final)" />
  <rect x="22" y="10" width="3" height="18" rx="1" fill="url(#grad-admin-yellow-final)" />
  <rect x="26" y="4" width="3" height="24" rx="1" fill="url(#grad-admin-yellow-final)" />
</svg>
